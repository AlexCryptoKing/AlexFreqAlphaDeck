# Freqtrade Multi-Bot Dashboard Configuration
# Copy this file to dashboard.yaml and adjust settings

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

database:
  url: "postgresql://dashboard:dashboard@localhost:5432/dashboard"
  pool_size: 5
  echo: false

redis:
  enabled: false
  url: "redis://localhost:6379/0"

discovery:
  docker:
    enabled: true
    socket: "unix://var/run/docker.sock"
    labels:
      - "com.freqtrade.bot_name"
    image_patterns:
      - "freqtradeorg/freqtrade"
      - "freqtrade/*"
  filesystem:
    enabled: true
    scan_paths:
      - "/opt/freqtrade/*/user_data"
      - "~/freqtrade_instances/*/user_data"
    patterns:
      - "tradesv3.sqlite"
      - "tradesv3.dryrun.sqlite"
  interval_seconds: 60

health:
  check_interval_seconds: 10
  latency_threshold_ms: 2000
  error_rate_threshold: 0.1
  recovery_window_seconds: 30

api_defaults:
  timeout_seconds: 5
  username: "user"
  password: "pass"

auth:
  jwt_secret: "${JWT_SECRET}"  # Set via environment variable
  jwt_algorithm: "HS256"
  token_expire_minutes: 60
  refresh_expire_days: 7

logging:
  level: "INFO"
  format: "json"
  file: null  # Set to path for file logging, e.g., "/var/log/dashboard/app.log"
